name: Run cloud training (Spot VM)

on:
  workflow_dispatch:
    inputs:
      machine_type:
        description: "VMマシンタイプ（vCPU数はexperiments.yamlのn_envsと合わせる）"
        default: "e2-standard-4"
        required: false
      max_run_duration:
        description: "強制終了までの最大実行時間（コスト安全策）"
        default: "21600s"
        required: false
      train_command:
        description: "VM内で実行する学習コマンド（動作確認用に上書き可能）"
        default: "python -m stockrl.cli.run_champion_loop_all_tickers"
        required: false

permissions:
  contents: write
  id-token: write

jobs:
  launch:
    runs-on: ubuntu-latest
    timeout-minutes: 370
    steps:
      - uses: actions/checkout@v4

      - id: auth
        uses: google-github-actions/auth@v2
        with:
          project_id: ${{ secrets.GCP_PROJECT_ID }}
          workload_identity_provider: ${{ secrets.GCP_WIF_PROVIDER }}
          service_account: ${{ secrets.GCP_SERVICE_ACCOUNT }}

      - uses: google-github-actions/setup-gcloud@v2

      - id: launch
        name: Launch Spot training VM
        run: |
          INSTANCE_NAME="kabu-simulator-trainer-$(date +%s)"
          # TRAIN_CMDはカンマ・引用符・&&等を含み得るため、--metadataのカンマ区切り
          # パースとは衝突する。ファイル経由（--metadata-from-file）で渡して回避する。
          printf '%s' "${{ inputs.train_command }}" > /tmp/train_cmd.txt
          PROJECT_NUMBER=$(gcloud projects describe "${{ secrets.GCP_PROJECT_ID }}" --format='value(projectNumber)')
          gcloud compute instances create "$INSTANCE_NAME" \
            --project="${{ secrets.GCP_PROJECT_ID }}" \
            --zone=asia-northeast1-a \
            --machine-type="${{ inputs.machine_type }}" \
            --image-family=debian-12 \
            --image-project=debian-cloud \
            --provisioning-model=SPOT \
            --instance-termination-action=DELETE \
            --max-run-duration="${{ inputs.max_run_duration }}" \
            --service-account="kabu-simulator-trainer@${{ secrets.GCP_PROJECT_ID }}.iam.gserviceaccount.com" \
            --scopes=cloud-platform \
            --boot-disk-size=30GB \
            --metadata-from-file=startup-script=training/startup-script.sh,TRAIN_CMD=/tmp/train_cmd.txt \
            --metadata=REPO_URL=https://github.com/${{ github.repository }}.git,GCS_BUCKET=gs://kabu-simulator-runs-${PROJECT_NUMBER},serial-port-logging-enable=true
          echo "instance_name=$INSTANCE_NAME" >> "$GITHUB_OUTPUT"

      - name: Show monitoring command
        run: |
          echo "進行状況確認: gcloud compute instances get-serial-port-output ${{ steps.launch.outputs.instance_name }} --zone=asia-northeast1-a"
          echo "VMは学習完了後（またはエラー時も）自動的に削除されます"

      - name: Wait for training VM to finish
        run: |
          INSTANCE_NAME="${{ steps.launch.outputs.instance_name }}"
          echo "学習完了（VM自己削除）を待機します..."
          while gcloud compute instances describe "$INSTANCE_NAME" \
              --zone=asia-northeast1-a \
              --project="${{ secrets.GCP_PROJECT_ID }}" >/dev/null 2>&1; do
            sleep 30
          done
          echo "VMが終了しました（学習完了 or エラー終了）。"

      - name: Sync results and refresh dashboard snapshot
        run: |
          PROJECT_NUMBER=$(gcloud projects describe "${{ secrets.GCP_PROJECT_ID }}" --format='value(projectNumber)')
          gcloud storage rsync -r "gs://kabu-simulator-runs-${PROJECT_NUMBER}/runs/" runs/
          python3 -m venv /tmp/.venv-sync
          . /tmp/.venv-sync/bin/activate
          pip install --upgrade pip
          # ダッシュボードのスナップショット作成にはPyYAML/python-dotenvのみで十分
          # （torch等の重い依存はクラウド学習VM側だけにあれば良い）
          pip install -e . --no-deps
          pip install pyyaml python-dotenv
          python -m stockrl.cli.snapshot_dashboard

      - name: Commit and push dashboard snapshot
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add dashboard/data
          if git diff --staged --quiet; then
            echo "ダッシュボードに変更なし（スキップ）"
          else
            git commit -m "クラウド学習結果でダッシュボードを自動更新"
            git push
          fi
